<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | AI Tools in Management Research</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1rem;
      color: #333;
    }
    header {
      border-bottom: 2px solid #e0e0e0;
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }
    h1 {
      font-size: 2rem;
      margin: 0 0 0.5rem 0;
      color: #2c3e50;
    }
    h2 {
      font-size: 1.5rem;
      margin: 1.5rem 0 0.75rem 0;
      color: #34495e;
    }
    h3 {
      font-size: 1.25rem;
      margin: 1.25rem 0 0.5rem 0;
      color: #34495e;
    }
    .meta {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    a {
      color: #007bff;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 0.75rem;
      text-align: left;
    }
    th {
      background: #f8f9fa;
      font-weight: 600;
    }
    code {
      background: #f4f4f4;
      padding: 0.2rem 0.4rem;
      border-radius: 3px;
      font-family: "Courier New", monospace;
    }
    pre {
      background: #f4f4f4;
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
    }
    pre code {
      background: none;
      padding: 0;
    }
    blockquote {
      border-left: 4px solid #007bff;
      padding-left: 1rem;
      margin: 1.5rem 0;
      color: #555;
    }
  </style>
</head>
<body>
  <header>
    <h1>AI Tools in Management Research</h1>
    <nav>
      <a href="/">← Back to Blog</a> | <a href="https://www.xiaoyingw.com">About Dr. Wang</a>
    </nav>
  </header>

  <div class="content">
    <h1>{{ page.title }}</h1>
    <div class="meta">{{ page.date | date: "%B %d, %Y" }}</div>

    {{ content }}
  </div>

  <footer>
    <hr style="margin: 2rem 0;">
    <p style="color: #666; font-size: 0.9rem;">
      © 2026 Dr. Xiao Ying Wang | <a href="/">Back to Blog</a>
    </p>
  </footer>
</body>
</html>
